<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transport Orchestration — Demo App</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #1A1F2E;
  --nav: #141825;
  --border: #3A3F52;
  --text: #E8EAF0;
  --text-2: #9AA3B8;
  --text-3: #5C6478;
  --blue: #4C9FEB;
  --green: #2ECC71;
  --amber: #F0A500;
  --red: #E05050;
  --orange: #E67E22;
  --active-bg: rgba(76,159,235,0.12);
  --active-border: rgba(76,159,235,0.4);
}
html, body { height: 100%; }
body {
  display: flex;
  flex-direction: column;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
}

/* ── Top nav ── */
.topnav {
  display: flex;
  align-items: center;
  height: 48px;
  background: var(--nav);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  gap: 0;
  flex-shrink: 0;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-right: 24px;
  border-right: 1px solid var(--border);
  margin-right: 8px;
}
.brand-logo {
  width: 24px;
  height: 24px;
  background: linear-gradient(135deg, #4C9FEB, #2ECC71);
  border-radius: 5px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  color: white;
}
.brand-name { font-size: 13px; font-weight: 700; color: var(--text); }
.brand-sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

.nav-tabs { display: flex; gap: 2px; flex: 1; }
.nav-tab {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 0 14px;
  height: 32px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
  border: 1px solid transparent;
  transition: all 0.15s;
  text-decoration: none;
  white-space: nowrap;
}
.nav-tab:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.nav-tab.active {
  background: var(--active-bg);
  border-color: var(--active-border);
  color: var(--blue);
}
.tab-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot-red { background: var(--red); }
.dot-blue { background: var(--blue); }
.dot-green { background: var(--green); }
.dot-amber { background: var(--amber); }

.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-left: 16px;
  border-left: 1px solid var(--border);
}
.live-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--green);
  background: rgba(46,204,113,0.1);
  border: 1px solid rgba(46,204,113,0.25);
  border-radius: 4px;
  padding: 3px 8px;
}
.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(46,204,113,0.4); }
  50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(46,204,113,0); }
}
.nav-persona { font-size: 11px; color: var(--text-3); }
.persona-name { color: var(--text-2); font-weight: 500; }

/* ── Frame container ── */
.frame-container {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.frame-container iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}
.frame-container iframe.active { display: block; }
</style>
</head>
<body>

<nav class="topnav">
  <div class="brand">
    <div class="brand-logo">TO</div>
    <div>
      <div class="brand-name">Transport Orchestration</div>
      <div class="brand-sub">Celonis Composable AI Demo</div>
    </div>
  </div>

  <div class="nav-tabs">
    <a class="nav-tab" onclick="switchTab('workflow')" id="tab-workflow">
      <span class="tab-dot dot-red"></span>
      Workflow
    </a>
    <a class="nav-tab" onclick="switchTab('orchestration-engine')" id="tab-orchestration-engine">
      <span class="tab-dot dot-blue"></span>
      Orchestration Engine
    </a>
    <a class="nav-tab" onclick="switchTab('value-tracking')" id="tab-value-tracking">
      <span class="tab-dot dot-green"></span>
      Value Tracking
    </a>
  </div>

  <div class="nav-right">
    <div class="live-badge"><span class="pulse"></span>Live</div>
    <div class="nav-persona">Persona: <span class="persona-name">Sarah Chen · Senior Transport Planner</span></div>
  </div>
</nav>

<div class="frame-container">
  <iframe id="frame-workflow" src="workflow.html" class="active"></iframe>
  <iframe id="frame-orchestration-engine" src="orchestration-engine.html"></iframe>
  <iframe id="frame-value-tracking" src="value-tracking.html"></iframe>
</div>

<script>
let currentTab = 'workflow';

function switchTab(name) {
  // Hide current
  document.getElementById('frame-' + currentTab).classList.remove('active');
  document.getElementById('tab-' + currentTab).classList.remove('active');
  // Show new
  document.getElementById('frame-' + name).classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  currentTab = name;
}

// Set initial active tab
document.getElementById('tab-workflow').classList.add('active');

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === '1') switchTab('workflow');
  if (e.key === '2') switchTab('orchestration-engine');
  if (e.key === '3') switchTab('value-tracking');
});
</script>
</body>
</html>
